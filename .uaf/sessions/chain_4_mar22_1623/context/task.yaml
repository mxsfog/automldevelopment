task:
  name: sports_betting_win_prediction
  description: >
    Предсказание победы ставки (won/lost) на спортивных событиях.
    Данные со стейкинг-платформы: синглы и парлаи, 20+ рынков,
    10+ видов спорта. Цель — ROI >= 10% на отобранных ставках.
  type: tabular_classification

data:
  files:
    - path: data/sports_betting/bets.csv
      role: main
    - path: data/sports_betting/outcomes.csv
      role: join
      join_on: {left: ID, right: Bet_ID}
      # ВАЖНО: из outcomes брать ТОЛЬКО поля известные ДО исхода ставки.
      # Запрещены: Payout_USD, final_score, result_at — это future information.
    - path: data/sports_betting/teams.csv
      role: reference
      # Содержит историческую статистику команд.
      # При джойне использовать temporal join: only records where date < bet Created_At
    - path: data/sports_betting/elo_history.csv
      role: reference
      # ELO рейтинги по датам.
      # Temporal join обязателен: брать последний ELO record где date < bet Created_At
  target_column: Status
  target_positive_class: won
  exclude_classes: [pending, cancelled, error, cashout]
  time_column: Created_At

validation:
  scheme: time_series
  test_size: 0.2
  gap_days: 7
  # Схема сплита:
  #   train: первые 80% по времени
  #   val:   следующие данные после gap_days (для выбора порогов, гиперпараметров)
  #   test:  финальный holdout — ТРОГАТЬ ТОЛЬКО ОДИН РАЗ в самом конце
  # Все пороги, фильтры, гиперпараметры выбираются на val, НЕ на test.

metric:
  name: roi
  direction: maximize
  target_value: 10.0
  description: >
    ROI = (sum(Payout_USD для won) - sum(USD)) / sum(USD) * 100.
    Считается на ставках где модель предсказала победу (порог по вероятности).
    Текущий baseline ROI = -2.69%. Цель: ROI >= 10%.
  custom: true
  also_track: [roc_auc, precision, recall, f1, cv_mean_roi, cv_std_roi, n_bets]
  leakage_sanity_threshold: 60.0  # ROI > 60% почти наверняка leakage — hard block
  leakage_soft_warning: 20.0      # ROI > 20% при CV mean < 5% — soft warning

leakage_prevention:
  # Эти правила обязательны. Нарушение = leakage = результат не считается.
  threshold_selection: val_only
    # Порог вероятности (и EV-порог) выбирается на val set.
    # Запрещено: подбирать порог смотря на test ROI.
  sport_segment_filter: val_only
    # Фильтрация видов спорта/сегментов только по val/CV перформансу.
    # Запрещено: исключать спорт потому что он "плохо показал себя на тесте".
  seed: fixed
    # Сид фиксирован (например 42). Перебор сидов и выбор лучшего по тесту — запрещён.
    # Допустимо: seed ensemble = среднее предсказаний по нескольким сидам.
  test_set_usage: final_eval_only
    # Тест-сет трогается ОДИН РАЗ — для финального репорта метрики.
    # Запрещено: любая итерация/оптимизация с использованием test labels.
  forbidden_future_columns:
    # Колонки которые нельзя использовать как фичи — future information
    - Payout_USD      # известно только после исхода ставки
    - final_score     # известно только после матча
    - result_at       # дата фиксации результата
  cv_required: true
    # Обязательно: логировать CV mean ROI и std ROI (минимум 3 фолда).
    # Если test_roi / abs(cv_mean_roi) > 5 → leakage suspect, требует объяснения.
  min_n_bets: 200
    # Минимальное количество отобранных ставок на test для валидного результата.
    # Меньше 200 ставок = слишком высокая дисперсия, результат ненадёжен.

baseline:
  description: >
    Текущая ML модель платформы: ML_P_Model (вероятность), ML_Edge, ML_EV.
    ROI существующей модели: -2.69% на всех ставках.
    Цель: ROI >= 10% на отобранных ставках (фильтрация по предсказанной вероятности).

betting_strategies:
  flat:
    stake: 1.0
    description: Одинаковая ставка на все выбранные исходы
  double_flat:
    stake: 2.0
    description: Двойная фиксированная ставка
  triple_flat:
    stake: 3.0
    description: Тройная фиксированная ставка

research_preferences:
  feature_importance: true
  min_feature_delta: 0.001
  shadow_feature_trick: true
  segment_analysis: true
  segment_columns: [Sport, Market, Is_Parlay]

  team_features:
    enabled: true
    temporal_join_column: Created_At
    # Все командные фичи — temporal join: only data where team_record_date < Created_At
    suggested_features:
      - name: elo_diff
        description: >
          ELO разница между командами на момент ставки.
          Берём из elo_history: последний record где date < Created_At для каждой команды.
      - name: elo_trend_30d
        description: >
          Изменение ELO за последние 30 дней до ставки (momentum формы команды).
      - name: last10_winrate
        description: >
          Процент побед за последние 10 игр до даты ставки.
          Считается по историческим результатам команды из teams.csv.
      - name: days_rest
        description: >
          Количество дней с последней игры команды (усталость/восстановление).
      - name: h2h_winrate
        description: >
          Исторический winrate в очных встречах двух команд (head-to-head).
          Только матчи ДО даты текущей ставки.
      - name: home_away_winrate
        description: >
          Раздельный winrate дома/в гостях за последние N игр.
    implementation_note: >
      При матче команды из bets.csv с teams.csv использовать нечёткое совпадение
      (fuzzy match) по названию команды или ID если есть прямой ключ.
      Проверить схему teams.csv перед реализацией.

budget:
  mode: fixed
  max_iterations: 50
  max_time_seconds: 28800  # 8 часов
